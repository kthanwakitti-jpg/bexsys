[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Cache static assets ──────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Redirects ────────────────────────────────────────────
[[redirects]]
  from = "http://bexsys.com/*"
  to   = "https://www.bexsys.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.bexsys.com/*"
  to   = "https://www.bexsys.com/:splat"
  status = 301
  force  = true
